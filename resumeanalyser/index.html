<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Analyser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      background: #0f0f17;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 800px;
      border: 1px solid #1e1e2e;
      box-shadow: 0 4px 40px rgba(0,0,0,0.4);
    }

    .header { text-align: center; margin-bottom: 32px; }

    .badge {
      display: inline-block;
      background: #1a1a2e;
      color: #7c6ff7;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid #2a2a4e;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header h1 { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .header p  { font-size: 13px; color: #555; }

    .inputs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .input-group { display: flex; flex-direction: column; }

    .label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: #0a0a0f;
      border: 1.5px solid #1e1e2e;
      border-radius: 12px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 14px;
      outline: none;
      resize: vertical;
      height: 220px;
      line-height: 1.6;
      transition: border 0.2s;
    }

    textarea:focus { border-color: #7c6ff7; }
    textarea::placeholder { color: #333; }

    .word-count {
      font-size: 11px;
      color: #444;
      text-align: right;
      margin-top: 4px;
    }

    .word-count.ready { color: #7c6ff7; }

    button {
      width: 100%;
      padding: 14px;
      background: #7c6ff7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    button:hover    { background: #6a5fe0; transform: translateY(-1px); }
    button:disabled { background: #1e1e2e; color: #444; cursor: not-allowed; transform: none; }

    .results {
      margin-top: 28px;
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }

    .results.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .score-card {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
    }

    .score-label {
      font-size: 11px;
      font-weight: 700;
      color: #7c6ff7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .score-number {
      font-size: 64px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .score-high   { color: #4caf87; }
    .score-medium { color: #ffb74d; }
    .score-low    { color: #f48fb1; }

    .score-summary {
      font-size: 13px;
      color: #666;
      margin-bottom: 16px;
    }

    .score-bar-wrap {
      background: #1a1a2e;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      max-width: 300px;
      margin: 0 auto;
    }

    .score-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease;
    }

    .bar-high   { background: linear-gradient(90deg, #1d9e75, #4caf87); }
    .bar-medium { background: linear-gradient(90deg, #e65100, #ffb74d); }
    .bar-low    { background: linear-gradient(90deg, #c62828, #f48fb1); }

    .result-card {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 20px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      color: #7c6ff7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 8px; }

    .tag-matched {
      background: #0a1a14;
      border: 1px solid #1d4a35;
      color: #4caf87;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag-missing {
      background: #1a0a0f;
      border: 1px solid #4a1a22;
      color: #f48fb1;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
    }

    .suggestion-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .suggestion-item {
      background: #14142a;
      border: 1px solid #2a2a4e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #e0e0e0;
      line-height: 1.6;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .suggestion-num {
      color: #7c6ff7;
      font-weight: 700;
      font-size: 13px;
      flex-shrink: 0;
    }

    .error {
      background: #1a0a0f;
      border: 1px solid #3a1a22;
      border-radius: 10px;
      padding: 14px;
      color: #f48fb1;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">⛓ LangChain · Multi-input Chain</div>
    <h1>Resume Analyser</h1>
    <p>Paste a job description and your resume — get a match score, missing skills, and suggestions</p>
  </div>

  <div class="inputs-grid">
    <div class="input-group">
      <span class="label">Job Description</span>
      <textarea id="jdInput"
        placeholder="Paste the job description here...">
      </textarea>
      <div class="word-count" id="jdCount">0 words</div>
    </div>
    <div class="input-group">
      <span class="label">Your Resume</span>
      <textarea id="resumeInput"
        placeholder="Paste your resume text here...">
      </textarea>
      <div class="word-count" id="resumeCount">0 words</div>
    </div>
  </div>

  <button id="btn" onclick="analyse()">Analyse Resume</button>

  <div class="error" id="error"></div>

  <div class="results" id="results">

    <div class="score-card">
      <div class="score-label">Match Score</div>
      <div class="score-number" id="scoreNumber">0</div>
      <div class="score-summary" id="scoreSummary"></div>
      <div class="score-bar-wrap">
        <div class="score-bar" id="scoreBar" style="width:0%"></div>
      </div>
    </div>

    <div class="result-card">
      <div class="card-label">✅ Matched Skills</div>
      <div class="tags" id="matchedSkills"></div>
    </div>

    <div class="result-card">
      <div class="card-label">❌ Missing Skills</div>
      <div class="tags" id="missingSkills"></div>
    </div>

    <div class="result-card">
      <div class="card-label">💡 Suggestions to Improve</div>
      <div class="suggestion-list" id="suggestions"></div>
    </div>

  </div>
</div>

<script>
  const jdInput     = document.getElementById('jdInput')
  const resumeInput = document.getElementById('resumeInput')
  const btn         = document.getElementById('btn')
  const results     = document.getElementById('results')
  const error       = document.getElementById('error')

  function countWords(textarea, countEl) {
    textarea.addEventListener('input', function() {
      const words = this.value.trim() === ''
        ? 0 : this.value.trim().split(/\s+/).length
      const el = document.getElementById(countEl)
      el.textContent = `${words} words`
      el.className   = words >= 20 ? 'word-count ready' : 'word-count'
    })
  }

  countWords(jdInput,     'jdCount')
  countWords(resumeInput, 'resumeCount')

  function getScoreClass(score) {
    if (score >= 70) return { num: 'score-high',   bar: 'bar-high' }
    if (score >= 40) return { num: 'score-medium', bar: 'bar-medium' }
    return { num: 'score-low', bar: 'bar-low' }
  }

  function renderTags(containerId, items, tagClass) {
    const el = document.getElementById(containerId)
    el.innerHTML = ''
    if (!items || items.length === 0) {
      el.innerHTML = '<span style="color:#444;font-size:12px;font-style:italic">None found</span>'
      return
    }
    items.forEach(item => {
      const tag = document.createElement('span')
      tag.className   = tagClass
      tag.textContent = item
      el.appendChild(tag)
    })
  }

  function renderSuggestions(items) {
    const el = document.getElementById('suggestions')
    el.innerHTML = ''
    if (!items || items.length === 0) return
    items.forEach((item, i) => {
      const div = document.createElement('div')
      div.className = 'suggestion-item'
      div.innerHTML = `<span class="suggestion-num">${i + 1}.</span>
                       <span>${item}</span>`
      el.appendChild(div)
    })
  }

  async function analyse() {
    const jd     = jdInput.value.trim()
    const resume = resumeInput.value.trim()
    if (!jd || !resume) return

    btn.disabled    = true
    btn.textContent = 'Analysing...'
    results.classList.remove('show')
    error.style.display = 'none'

    try {
      const response = await fetch('http://127.0.0.1:5000/analyse', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({
          job_description: jd,
          resume         : resume
        })
      })
      const data = await response.json()

      if (data.error) {
        error.textContent   = data.error
        error.style.display = 'block'
      } else {
        const score   = data.match_score || 0
        const classes = getScoreClass(score)

        const scoreEl = document.getElementById('scoreNumber')
        scoreEl.textContent = `${score}%`
        scoreEl.className   = `score-number ${classes.num}`

        document.getElementById('scoreSummary').textContent = data.summary || ''

        const barEl = document.getElementById('scoreBar')
        barEl.style.width = `${score}%`
        barEl.className   = `score-bar ${classes.bar}`

        renderTags('matchedSkills', data.matched_skills, 'tag-matched')
        renderTags('missingSkills', data.missing_skills, 'tag-missing')
        renderSuggestions(data.suggestions)

        results.classList.add('show')
      }
    } catch {
      error.textContent   = 'Error: Is app.py running?'
      error.style.display = 'block'
    }

    btn.disabled    = false
    btn.textContent = 'Analyse Resume'
  }
</script>

</body>
</html>
