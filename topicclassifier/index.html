<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TopicClassifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
}

.container {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 40px;
  width: 100%;
  max-width: 720px;
  box-shadow: 0 4px 40px rgba(0,0,0,0.6);
  border: 1px solid #2a2a2a;
}

.header { text-align: center; margin-bottom: 32px; }
.header h1 { font-size: 28px; font-weight: 700; color: #ffffff; }
.header p  { font-size: 14px; color: #666; margin-top: 6px; }

label {
  font-size: 13px;
  font-weight: 600;
  color: #aaa;
  display: block;
  margin-bottom: 8px;
}

textarea {
  width: 100%;
  padding: 16px;
  border: 1.5px solid #2a2a2a;
  border-radius: 12px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  height: 150px;
  outline: none;
  transition: border 0.2s;
  color: #e0e0e0;
  background: #111111;
  line-height: 1.6;
}

textarea:focus { border-color: #7c6ff7; }

textarea::placeholder { color: #444; }

.categories-section {
  margin-top: 20px;
  margin-bottom: 4px;
}

.categories-label {
  font-size: 13px;
  font-weight: 600;
  color: #aaa;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.categories-label span {
  font-size: 11px;
  color: #7c6ff7;
  cursor: pointer;
  font-weight: 400;
}

.category-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
}

.cat-chip {
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  background: #222;
  color: #666;
  cursor: pointer;
  border: 1.5px solid #333;
  transition: all 0.15s;
  user-select: none;
}

.cat-chip.active {
  background: #2a2040;
  color: #a89df5;
  border-color: #7c6ff7;
}

.custom-input {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.custom-input input {
  flex: 1;
  padding: 8px 14px;
  border: 1.5px solid #2a2a2a;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border 0.2s;
  background: #111;
  color: #e0e0e0;
}

.custom-input input:focus { border-color: #7c6ff7; }
.custom-input input::placeholder { color: #444; }

.custom-input button {
  padding: 8px 16px;
  background: #7c6ff7;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  width: auto;
  margin-top: 0;
  transition: background 0.2s;
}

.custom-input button:hover { background: #6a5fe0; }

button {
  width: 100%;
  padding: 14px;
  background: #7c6ff7;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  transition: background 0.2s;
  font-family: inherit;
}

button:hover    { background: #6a5fe0; }
button:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

.result {
  margin-top: 28px;
  display: none;
}

.result-card {
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  border: 1.5px solid #2a2040;
  background: #16122a;
}

.result-label {
  font-size: 12px;
  font-weight: 700;
  color: #7c6ff7;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.result-category {
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 6px;
}

.result-reason {
  font-size: 14px;
  color: #888;
  line-height: 1.6;
  margin-bottom: 16px;
}

.confidence-label {
  font-size: 12px;
  color: #666;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
}

.confidence-bar-wrap {
  background: #222;
  border-radius: 99px;
  height: 8px;
  overflow: hidden;
}

.confidence-bar {
  height: 100%;
  border-radius: 99px;
  background: #7c6ff7;
  transition: width 0.6s ease;
}

.error-box {
  background: #2a1018;
  border: 1.5px solid #6b2737;
  border-radius: 12px;
  padding: 16px;
  color: #f48fb1;
  font-size: 14px;
  margin-top: 16px;
  display: none;
}

.examples { margin-top: 20px; }

.examples p {
  font-size: 12px;
  color: #555;
  margin-bottom: 8px;
}

.example-btn {
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  cursor: pointer;
  margin-right: 8px;
  margin-bottom: 8px;
  color: #888;
  transition: all 0.15s;
  display: inline-block;
  width: auto;
  margin-top: 0;
}

.example-btn:hover {
  background: #2a2040;
  border-color: #7c6ff7;
  color: #a89df5;
}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>TopicClassifier</h1>
    <p>Paste any text and instantly classify it into a topic</p>
  </div>

  <label>Your text</label>
  <textarea id="inputText"
    placeholder="Paste any sentence or paragraph here...">
  </textarea>

  <div class="categories-section">
    <div class="categories-label">
      Select categories to classify into
      <span onclick="selectAll()">Select all</span>
    </div>
    <div class="category-chips" id="categoryChips"></div>
    <div class="custom-input">
      <input type="text" id="customCat"
        placeholder="Add your own category e.g. Fashion"/>
      <button onclick="addCustomCategory()">Add</button>
    </div>
  </div>

  <button id="classifyBtn" onclick="classify()">Classify Topic</button>

  <div class="error-box" id="errorBox"></div>

  <div class="result" id="result">
    <div class="result-card">
      <div class="result-label">Detected Topic</div>
      <div class="result-category" id="resultCategory"></div>
      <div class="result-reason"   id="resultReason"></div>
      <div class="confidence-label">
        <span>Confidence</span>
        <span id="confidenceText">0%</span>
      </div>
      <div class="confidence-bar-wrap">
        <div class="confidence-bar" id="confidenceBar"
             style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="examples">
    <p>Try these examples:</p>
    <span class="example-btn" onclick="loadExample('tech')">
      💻 Technology
    </span>
    <span class="example-btn" onclick="loadExample('health')">
      🏥 Health
    </span>
    <span class="example-btn" onclick="loadExample('sports')">
      ⚽ Sports
    </span>
    <span class="example-btn" onclick="loadExample('business')">
      💼 Business
    </span>
  </div>
</div>

<script>
  const DEFAULT_CATEGORIES = [
    "Technology", "Health & Medicine", "Sports",
    "Politics", "Business & Finance", "Science",
    "Entertainment", "Education", "Environment", "Crime & Law"
  ]

  const examples = {
    tech    : "Apple just released the new iPhone with an advanced AI chip that can run large language models locally without internet connection.",
    health  : "Researchers at Harvard Medical School discovered that daily walking for 30 minutes reduces the risk of heart disease by 35 percent.",
    sports  : "Virat Kohli scored his 50th ODI century yesterday making him the first player in cricket history to achieve this milestone.",
    business: "The Federal Reserve raised interest rates by 0.25 percent today causing the stock market to drop by 2 percent across all major indices."
  }

  let activeCategories = new Set(DEFAULT_CATEGORIES)

  // build category chips on page load
  function buildChips() {
    const container = document.getElementById("categoryChips")
    container.innerHTML = ""
    activeCategories.forEach(cat => {
      const chip = document.createElement("div")
      chip.classList.add("cat-chip", "active")
      chip.textContent = cat
      chip.onclick = () => toggleCategory(chip, cat)
      container.appendChild(chip)
    })
  }

  function toggleCategory(chip, cat) {
    if (chip.classList.contains("active")) {
      chip.classList.remove("active")
      activeCategories.delete(cat)
    } else {
      chip.classList.add("active")
      activeCategories.add(cat)
    }
  }

  function selectAll() {
    document.querySelectorAll(".cat-chip").forEach(chip => {
      chip.classList.add("active")
      activeCategories.add(chip.textContent)
    })
  }

  function addCustomCategory() {
    const input = document.getElementById("customCat")
    const val   = input.value.trim()
    if (val === "") return
    activeCategories.add(val)
    buildChips()
    input.value = ""
  }

  function loadExample(type) {
    document.getElementById("inputText").value = examples[type]
  }

  async function classify() {
    const text = document.getElementById("inputText").value.trim()
    if (text === "") return

    const selectedCats = Array.from(activeCategories)
    if (selectedCats.length === 0) {
      alert("Please select at least one category")
      return
    }

    const btn      = document.getElementById("classifyBtn")
    const result   = document.getElementById("result")
    const errorBox = document.getElementById("errorBox")

    btn.disabled    = true
    btn.textContent = "Classifying..."
    result.style.display   = "none"
    errorBox.style.display = "none"

    try {
      const response = await fetch("http://127.0.0.1:5000/classify", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({
          text      : text,
          categories: selectedCats
        })
      })

      const data = await response.json()

      if (data.error) {
        errorBox.textContent   = data.error
        errorBox.style.display = "block"
      } else {
        document.getElementById("resultCategory").textContent =
          data.category
        document.getElementById("resultReason").textContent =
          data.reason
        document.getElementById("confidenceText").textContent =
          `${data.confidence}%`
        document.getElementById("confidenceBar").style.width =
          `${data.confidence}%`
        result.style.display = "block"
      }

    } catch (err) {
      errorBox.textContent   = "Error: Is app.py running?"
      errorBox.style.display = "block"
    }

    btn.disabled    = false
    btn.textContent = "Classify Topic"
  }

  // initialize chips on load
  buildChips()
</script>

</body>
</html>
