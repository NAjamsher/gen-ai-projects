<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FAQ Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container { width: 100%; max-width: 820px; }

    .header { text-align: center; margin-bottom: 28px; }

    .badge {
      display: inline-block;
      background: #1a1a2e;
      color: #7c6ff7;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid #2a2a4e;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .header p  { font-size: 13px; color: #555; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: #0f0f17;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      padding: 22px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: #7c6ff7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    /* ── CHAT ── */
    .chat-window {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 16px;
      height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 14px;
    }

    .chat-empty {
      color: #2a2a3a;
      font-size: 13px;
      text-align: center;
      margin: auto;
      line-height: 1.8;
    }

    .bubble { max-width: 88%; padding: 11px 15px; border-radius: 12px; font-size: 13px; line-height: 1.7; }
    .bubble.user { background: #1a1a3a; color: #c0b8ff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bubble.ai   { background: #0f0f1f; border: 1px solid #1e1e2e; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }

    .chat-row { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      background: #0a0a0f;
      border: 1.5px solid #1e1e2e;
      border-radius: 12px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #7c6ff7; }
    input::placeholder { color: #2a2a3a; }

    .btn {
      padding: 12px 20px;
      background: #7c6ff7;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .btn:hover    { background: #6a5fe0; }
    .btn:disabled { background: #1e1e2e; color: #444; cursor: not-allowed; }

    /* ── SUGGESTIONS ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .suggestion {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 99px;
      padding: 6px 14px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .suggestion:hover { border-color: #7c6ff7; color: #a89df5; background: #14142a; }

    /* ── FAQ LIST ── */
    .faq-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 560px;
      overflow-y: auto;
    }

    .faq-item {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .faq-item:hover { border-color: #7c6ff7; background: #0f0f20; }

    .faq-q {
      font-size: 12px;
      font-weight: 600;
      color: #a89df5;
      margin-bottom: 4px;
    }

    .faq-a {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .error {
      background: #1a0a0f;
      border: 1px solid #3a1a22;
      border-radius: 10px;
      padding: 10px 14px;
      color: #f48fb1;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">⚡ RAG · Semantic FAQ · LangChain</div>
    <h1>FAQ Bot</h1>
    <p>Ask anything — I find the right answer even if you phrase it differently</p>
  </div>

  <div class="layout">

    <!-- LEFT — CHAT -->
    <div class="card">
      <div class="card-title">💬 Customer Support Chat</div>

      <div class="suggestions" id="suggestions">
        <button class="suggestion" onclick="ask('What are your business hours?')">Business hours</button>
        <button class="suggestion" onclick="ask('What is your return policy?')">Return policy</button>
        <button class="suggestion" onclick="ask('How do I track my order?')">Track order</button>
        <button class="suggestion" onclick="ask('Do you offer free shipping?')">Free shipping</button>
        <button class="suggestion" onclick="ask('How do I contact support?')">Contact support</button>
      </div>

      <div class="chat-window" id="chat-window">
        <div class="chat-empty" id="chat-empty">
          👋 Hi! I am your FAQ assistant.<br>
          Ask me anything about our services.
        </div>
      </div>

      <div class="chat-row">
        <input type="text" id="question-input" placeholder="Type your question here..." />
        <button class="btn" id="ask-btn" onclick="sendQuestion()">Ask</button>
      </div>
      <div class="error" id="ask-error"></div>
    </div>

    <!-- RIGHT — FAQ LIST -->
    <div class="card">
      <div class="card-title">📋 All FAQs — click to ask</div>
      <div class="faq-list" id="faq-list">
        <div style="color:#333; font-size:12px;">Loading FAQs...</div>
      </div>
    </div>

  </div>

</div>

<script>
  // ── LOAD FAQS ON START ─────────────────────────────────────
  window.addEventListener('load', async () => {
    try {
      const res  = await fetch('http://127.0.0.1:5001/faqs')
      const data = await res.json()
      const list = document.getElementById('faq-list')
      list.innerHTML = ''
      data.faqs.forEach(faq => {
        list.innerHTML += `
          <div class="faq-item" onclick="ask('${faq.question.replace(/'/g, "\\'")}')">
            <div class="faq-q">${faq.question}</div>
            <div class="faq-a">${faq.answer}</div>
          </div>`
      })
    } catch {
      document.getElementById('faq-list').innerHTML =
        '<div style="color:#555;font-size:12px;">Could not load FAQs.</div>'
    }
  })

  // ── SEND QUESTION ──────────────────────────────────────────
  async function sendQuestion() {
    const query = document.getElementById('question-input').value.trim()
    if (!query) return
    ask(query)
  }

  async function ask(query) {
    document.getElementById('question-input').value = ''
    document.getElementById('ask-btn').disabled     = true
    document.getElementById('ask-error').style.display  = 'none'
    document.getElementById('chat-empty').style.display = 'none'

    addBubble(query, 'user')
    const thinkId = addBubble('Looking up the answer...', 'ai')

    try {
      const res  = await fetch('http://127.0.0.1:5001/ask', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ query })
      })
      const data = await res.json()

      if (data.error) {
        document.getElementById(thinkId).textContent = data.error
      } else {
        document.getElementById(thinkId).textContent = data.answer
      }
    } catch {
      document.getElementById(thinkId).textContent = 'Error: Is app.py running?'
    }

    document.getElementById('ask-btn').disabled = false
  }

  // ── BUBBLE ─────────────────────────────────────────────────
  let bubbleCount = 0
  function addBubble(text, role) {
    const win = document.getElementById('chat-window')
    const id  = 'bubble-' + (++bubbleCount)
    const div = document.createElement('div')
    div.className   = `bubble ${role}`
    div.id          = id
    div.textContent = text
    win.appendChild(div)
    win.scrollTop = win.scrollHeight
    return id
  }

  // ── ENTER KEY ──────────────────────────────────────────────
  document.getElementById('question-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendQuestion()
  })
</script>
</body>
</html>
