<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TextSpark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: white;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .chat-header {
      padding: 18px 24px;
      background: #6c63ff;
      color: white;
    }

    .chat-header h1 { font-size: 20px; font-weight: 600; }
    .chat-header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 75%;
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.ai   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.user .bubble {
      background: #6c63ff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.ai .bubble {
      background: #f0f2f5;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .label {
      font-size: 11px;
      color: #999;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      color: #999;
      font-style: italic;
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .chat-input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      font-family: inherit;
    }

    .chat-input-area input:focus { border-color: #6c63ff; }

    .chat-input-area button {
      padding: 12px 22px;
      background: #6c63ff;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
    }

    .chat-input-area button:hover    { background: #574fd6; }
    .chat-input-area button:disabled { background: #b0acf5; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>TextSpark</h1>
    <p>Powered by Llama 3.1 via HuggingFace</p>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message ai">
      <div class="label">TextSpark</div>
      <div class="bubble">Hello! I am TextSpark. Ask me anything!</div>
    </div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chatMessages = document.getElementById("chatMessages");
  const userInput    = document.getElementById("userInput");
  const sendBtn      = document.getElementById("sendBtn");

  userInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
  });

  function addMessage(role, text) {
    const wrapper = document.createElement("div");
    wrapper.classList.add("message", role);

    const label = document.createElement("div");
    label.classList.add("label");
    label.textContent = role === "user" ? "You" : "TextSpark";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.textContent = text;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    chatMessages.appendChild(wrapper);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return wrapper;
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (message === "") return;

    addMessage("user", message);
    userInput.value = "";
    sendBtn.disabled = true;

    const typing = addMessage("ai", "Thinking...");
    typing.classList.add("typing");

    try {
      const response = await fetch("http://127.0.0.1:5000/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
      });

      const data = await response.json();
      chatMessages.removeChild(typing);
      addMessage("ai", data.reply);

    } catch (error) {
      chatMessages.removeChild(typing);
      addMessage("ai", "Error: Could not reach the server. Is app.py running?");
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>

</body>
</html>
