<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 20px;
    }

    .container { width: 100%; max-width: 860px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #1a0a2e, #0a0a1f, #0a1a2e);
      border: 1px solid #2a2a4e;
      border-radius: 16px;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .brand { display: flex; align-items: center; gap: 14px; }
    .brand-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #7c6ff7, #378ADD);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-name { font-size: 18px; font-weight: 700; color: #fff; }
    .brand-sub  { font-size: 12px; color: #555; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: #0f1a0f; border: 1px solid #1a3a1a;
      border-radius: 99px; padding: 6px 14px;
      font-size: 12px; color: #4caf88;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4caf88; animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 14px;
    }

    /* ── CHAT ── */
    .chat-card {
      background: #0f0f17;
      border: 1px solid #1e1e2e;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 14px 18px;
      border-bottom: 1px solid #1e1e2e;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .agent-info { display: flex; align-items: center; gap: 10px; }
    .agent-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #7c6ff7, #378ADD);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
    }
    .agent-name { font-size: 13px; font-weight: 600; color: #e0e0e0; }
    .agent-role { font-size: 11px; color: #555; }

    .btn-clear {
      background: none; border: 1px solid #1e1e2e;
      border-radius: 8px; padding: 5px 12px;
      font-size: 11px; color: #555; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-clear:hover { border-color: #7c6ff7; color: #a89df5; }

    .chat-window {
      flex: 1;
      min-height: 420px;
      max-height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-empty {
      color: #2a2a3a;
      font-size: 13px;
      text-align: center;
      margin: auto;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
    .bubble-wrap.user { align-items: flex-end; }
    .bubble-wrap.bot  { align-items: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .bubble.user {
      background: #1a1a3a;
      color: #c0b8ff;
      border-bottom-right-radius: 4px;
      border: 1px solid #2a2a5e;
    }

    .bubble.bot {
      background: #0f0f1f;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #1e1e2e;
    }

    .bubble-meta {
      font-size: 10px;
      color: #333;
      padding: 0 4px;
    }

    .intent-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      margin-bottom: 4px;
    }

    .ticket-pill {
      background: #1a0a2e;
      border: 1px solid #3a2a5e;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 12px;
      color: #a89df5;
      margin-top: 6px;
      display: inline-block;
    }

    .chat-input-area {
      padding: 14px;
      border-top: 1px solid #1e1e2e;
    }

    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .qr-btn {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .qr-btn:hover {
      border-color: #7c6ff7;
      color: #a89df5;
      background: #14142a;
    }

    .input-row { display: flex; gap: 8px; }

    input[type="text"] {
      flex: 1;
      background: #0a0a0f;
      border: 1.5px solid #1e1e2e;
      border-radius: 10px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: #7c6ff7; }
    input::placeholder { color: #2a2a3a; }

    .send-btn {
      padding: 11px 18px;
      background: linear-gradient(135deg, #7c6ff7, #378ADD);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    .send-btn:hover    { opacity: 0.9; transform: translateY(-1px); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }

    .side-card {
      background: #0f0f17;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 16px;
    }

    .side-title {
      font-size: 11px;
      font-weight: 700;
      color: #7c6ff7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .order-input-row { display: flex; flex-direction: column; gap: 8px; }

    .order-input-row input {
      width: 100%;
      background: #0a0a0f;
      border: 1.5px solid #1e1e2e;
      border-radius: 8px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      padding: 9px 12px;
      outline: none;
    }

    .order-input-row input:focus { border-color: #7c6ff7; }

    .lookup-btn {
      width: 100%;
      padding: 9px;
      background: #1a1a3a;
      border: 1px solid #2a2a5e;
      border-radius: 8px;
      color: #a89df5;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .lookup-btn:hover { background: #2a2a4e; }

    .order-result {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
      color: #888;
      line-height: 1.8;
      margin-top: 8px;
      display: none;
    }

    .order-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 10px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .status-delivered    { background: #0d2a1a; color: #4caf88; }
    .status-transit      { background: #0d1a2a; color: #64b5f6; }
    .status-processing   { background: #2a2a0d; color: #f0c040; }
    .status-cancelled    { background: #2a0d0d; color: #ef9a9a; }
    .status-out-delivery { background: #1a0d2a; color: #ce93d8; }

    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }

    .ticket-item {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 10px;
      font-size: 11px;
    }

    .ticket-id    { color: #7c6ff7; font-weight: 700; margin-bottom: 3px; }
    .ticket-issue { color: #666; line-height: 1.5; }
    .ticket-meta  { color: #333; margin-top: 4px; }

    .priority-high   { color: #ef9a9a; }
    .priority-normal { color: #f0c040; }

    .empty-state {
      color: #2a2a3a;
      font-size: 12px;
      text-align: center;
      padding: 10px;
    }

    .error-msg {
      background: #1a0a0f;
      border: 1px solid #3a1a22;
      border-radius: 8px;
      padding: 10px;
      color: #f48fb1;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-icon">🛍️</div>
      <div>
        <div class="brand-name">ShopEasy Support</div>
        <div class="brand-sub">Powered by AI · Available 24/7</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="layout">

    <!-- CHAT -->
    <div class="chat-card">
      <div class="chat-header">
        <div class="agent-info">
          <div class="agent-avatar">A</div>
          <div>
            <div class="agent-name">Aria</div>
            <div class="agent-role">AI Support Agent</div>
          </div>
        </div>
        <button class="btn-clear" onclick="clearChat()">New Chat</button>
      </div>

      <div class="chat-window" id="chat-window">
        <div class="chat-empty" id="chat-empty">
          👋 Hi! I am Aria, your support assistant.<br>
          How can I help you today?
        </div>
      </div>

      <div class="chat-input-area">
        <div class="quick-replies">
          <button class="qr-btn" onclick="send('Track my order')">📦 Track Order</button>
          <button class="qr-btn" onclick="send('I want to return my item')">↩️ Return</button>
          <button class="qr-btn" onclick="send('Cancel my order')">❌ Cancel</button>
          <button class="qr-btn" onclick="send('What is your return policy?')">📋 Policy</button>
          <button class="qr-btn" onclick="send('I received a damaged item')">⚠️ Damaged</button>
        </div>
        <div class="input-row">
          <input type="text" id="msg-input" placeholder="Type your message..." />
          <button class="send-btn" id="send-btn" onclick="send()">Send →</button>
        </div>
        <div class="error-msg" id="error-msg"></div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">

      <!-- ORDER LOOKUP -->
      <div class="side-card">
        <div class="side-title">🔍 Order Lookup</div>
        <div class="order-input-row">
          <input type="text" id="order-input" placeholder="Enter Order ID e.g. ORD001" />
          <button class="lookup-btn" onclick="lookupOrder()">Look Up Order</button>
        </div>
        <div class="order-result" id="order-result"></div>
      </div>

      <!-- ACTIVE TICKETS -->
      <div class="side-card">
        <div class="side-title">🎫 Support Tickets</div>
        <div class="ticket-list" id="ticket-list">
          <div class="empty-state">No tickets yet</div>
        </div>
      </div>

      <!-- SAMPLE ORDERS -->
      <div class="side-card">
        <div class="side-title">📦 Test Order IDs</div>
        <div style="font-size:11px; color:#444; line-height:2;">
          <div onclick="setOrderId('ORD001')" style="cursor:pointer; color:#7c6ff7;">ORD001</div>
          <div onclick="setOrderId('ORD002')" style="cursor:pointer; color:#7c6ff7;">ORD002</div>
          <div onclick="setOrderId('ORD003')" style="cursor:pointer; color:#7c6ff7;">ORD003</div>
          <div onclick="setOrderId('ORD004')" style="cursor:pointer; color:#7c6ff7;">ORD004</div>
          <div onclick="setOrderId('ORD005')" style="cursor:pointer; color:#7c6ff7;">ORD005</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  const SESSION_ID = "session_" + Math.random().toString(36).substr(2, 9)
  let bubbleCount  = 0

  // ── INTENT COLORS ──────────────────────────────────────────
  const intentColors = {
    ORDER_STATUS : { bg: "#0d1a2a", color: "#64b5f6" },
    RETURN       : { bg: "#0d2a1a", color: "#4caf88" },
    CANCEL       : { bg: "#2a0d0d", color: "#ef9a9a" },
    COMPLAINT    : { bg: "#2a1a0d", color: "#ffb74d" },
    PAYMENT      : { bg: "#1a0d2a", color: "#ce93d8" },
    GENERAL      : { bg: "#1a1a2e", color: "#a89df5" },
    GREETING     : { bg: "#0d2a1a", color: "#4caf88" },
    ESCALATE     : { bg: "#2a0d0d", color: "#f48fb1" },
  }

  // ── SEND MESSAGE ───────────────────────────────────────────
  async function send(preset) {
    const input = document.getElementById('msg-input')
    const msg   = preset || input.value.trim()
    if (!msg) return

    input.value = ''
    document.getElementById('send-btn').disabled    = true
    document.getElementById('send-btn').textContent = '...'
    document.getElementById('error-msg').style.display = 'none'
    document.getElementById('chat-empty').style.display = 'none'

    addBubble(msg, 'user')
    const thinkId = addBubble('Aria is typing...', 'bot')

    try {
      const res  = await fetch('http://127.0.0.1:5001/chat', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ session_id: SESSION_ID, message: msg })
      })
      const data = await res.json()

      if (data.error) {
        document.getElementById(thinkId).textContent = data.error
      } else {
        // update bot bubble
        const bubble = document.getElementById(thinkId)
        bubble.textContent = data.response

        // show intent tag
        const wrap  = bubble.closest('.bubble-wrap')
        const color = intentColors[data.intent] || intentColors.GENERAL
        const tag   = document.createElement('div')
        tag.className   = 'intent-tag'
        tag.textContent = data.intent.replace("_", " ")
        tag.style.background = color.bg
        tag.style.color      = color.color
        wrap.insertBefore(tag, bubble)

        // show ticket pill
        if (data.ticket_id) {
          const pill = document.createElement('div')
          pill.className   = 'ticket-pill'
          pill.textContent = `🎫 Ticket created: ${data.ticket_id}`
          wrap.appendChild(pill)
          refreshTickets()
        }
      }
    } catch {
      document.getElementById(thinkId).textContent = 'Error: Is app.py running?'
    }

    document.getElementById('send-btn').disabled    = false
    document.getElementById('send-btn').textContent = 'Send →'
  }

  // ── ADD BUBBLE ─────────────────────────────────────────────
  function addBubble(text, role) {
    const win  = document.getElementById('chat-window')
    const id   = 'bubble-' + (++bubbleCount)
    const wrap = document.createElement('div')
    wrap.className = `bubble-wrap ${role}`

    const div = document.createElement('div')
    div.className   = `bubble ${role}`
    div.id          = id
    div.textContent = text

    const meta = document.createElement('div')
    meta.className   = 'bubble-meta'
    meta.textContent = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })

    wrap.appendChild(div)
    wrap.appendChild(meta)
    win.appendChild(wrap)
    win.scrollTop = win.scrollHeight
    return id
  }

  // ── ORDER LOOKUP ───────────────────────────────────────────
  async function lookupOrder() {
    const orderId = document.getElementById('order-input').value.trim().toUpperCase()
    if (!orderId) return

    const result = document.getElementById('order-result')
    result.style.display = 'block'
    result.innerHTML     = 'Looking up...'

    try {
      const res  = await fetch(`http://127.0.0.1:5001/orders/${orderId}`)
      const data = await res.json()

      if (data.error) {
        result.innerHTML = `<span style="color:#f48fb1">${data.error}</span>`
      } else {
        const o          = data.order
        const statusMap  = {
          "Delivered"       : "status-delivered",
          "In Transit"      : "status-transit",
          "Processing"      : "status-processing",
          "Cancelled"       : "status-cancelled",
          "Out for Delivery": "status-out-delivery"
        }
        result.innerHTML = `
          <div class="order-status ${statusMap[o.status] || ''}">${o.status}</div>
          <div><strong style="color:#ccc">${o.item}</strong></div>
          <div>Date: ${o.date}</div>
          <div>Amount: ₹${o.amount}</div>
          ${o.tracking ? `<div>Tracking: ${o.tracking}</div>` : '<div>Tracking: Pending</div>'}
        `
      }
    } catch {
      result.innerHTML = '<span style="color:#f48fb1">Error: Is app.py running?</span>'
    }
  }

  // ── REFRESH TICKETS ────────────────────────────────────────
  async function refreshTickets() {
    try {
      const res  = await fetch('http://127.0.0.1:5001/tickets')
      const data = await res.json()
      const list = document.getElementById('ticket-list')

      if (data.tickets.length === 0) {
        list.innerHTML = '<div class="empty-state">No tickets yet</div>'
        return
      }

      list.innerHTML = ''
      data.tickets.slice().reverse().forEach(t => {
        list.innerHTML += `
          <div class="ticket-item">
            <div class="ticket-id">${t.id}
              <span class="priority-${t.priority.toLowerCase()}">[${t.priority}]</span>
            </div>
            <div class="ticket-issue">${t.issue.substring(0, 60)}${t.issue.length > 60 ? '...' : ''}</div>
            <div class="ticket-meta">${t.created_at} · ${t.status}</div>
          </div>`
      })
    } catch {}
  }

  // ── HELPERS ────────────────────────────────────────────────
  function setOrderId(id) {
    document.getElementById('order-input').value = id
    lookupOrder()
  }

  async function clearChat() {
    await fetch('http://127.0.0.1:5001/clear', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ session_id: SESSION_ID })
    })
    document.getElementById('chat-window').innerHTML =
      '<div class="chat-empty" id="chat-empty">👋 Hi! I am Aria, your support assistant.<br>How can I help you today?</div>'
  }

  // ── ENTER KEY ──────────────────────────────────────────────
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') send()
  })

  // ── INITIAL TICKET LOAD ────────────────────────────────────
  refreshTickets()
</script>
</body>
</html>
